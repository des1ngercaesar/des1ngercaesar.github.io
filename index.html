<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TikGrid - TikTok Grid Maker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    >

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="background"></div>

<div class="container">

    <header>

        <h1>TikGrid</h1>

        <p>
            Create seamless TikTok profile grids in seconds.
        </p>

    </header>

    <section class="card upload-card">

        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

        <h2>Upload Image</h2>

        <span>Drag & Drop or Click Here</span>

    </section>

    <section class="layout-selector">

        <button class="layout-btn active">
            3 Videos
        </button>

        <button class="layout-btn">
            9 Videos
        </button>

    </section>

    <section class="card">

        <h3>Crop Preview</h3>

        <div class="placeholder">
            Coming Soon...
        </div>

    </section>

    <section class="card">

        <h3>Generated Tiles</h3>

        <div class="tiles">

            <div></div>
            <div></div>
            <div></div>

            <div></div>
            <div></div>
            <div></div>

            <div></div>
            <div></div>
            <div></div>

        </div>

    </section>

</div>

<div class="credit">

    @des1ngner_caesar

</div>

<script src="script.js"></script>

</body>
</html>
